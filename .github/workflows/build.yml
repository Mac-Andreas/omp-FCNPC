name: build

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure (Win32)
        run: cmake -B build -A Win32
      - name: Build (Release)
        run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: FCNPC-win-x86
          path: build/Release/FCNPC.dll
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install 32-bit toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib g++-multilib
      - name: Configure (x86)
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_FLAGS=-m32
          -DCMAKE_CXX_FLAGS=-m32
          -DCMAKE_SHARED_LINKER_FLAGS=-m32
      - name: Build
        run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: FCNPC-linux-x86
          path: build/FCNPC.so
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ windows, linux ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package
        run: |
          mkdir -p dist/filterscripts
          cp artifacts/FCNPC-win-x86/FCNPC.dll dist/
          cp artifacts/FCNPC-linux-x86/FCNPC.so dist/
          cp include/FCNPC.inc dist/
          cp filterscripts/fcnpc_test.pwn dist/filterscripts/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FCNPC.dll
            dist/FCNPC.so
            dist/FCNPC.inc
            dist/filterscripts/fcnpc_test.pwn
          generate_release_notes: true
